<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FlowApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="flex justify-between items-end px-6 py-4 bg-white shadow">
  <h1 class="text-xl font-bold">FlowApp</h1>

  <div class="ml-auto flex items-center gap-5">
    <div class="hidden md:flex gap-5">
      <a href="#">Features</a>
      <a href="#">Pricing</a>
      <a href="#">Reviews</a>
    </div>

    <button class="bg-blue-500 text-white px-4 py-2 rounded">
      Get Started
    </button>
  </div>
</nav>


<!-- HERO -->
<section class="px-6 py-16">

  <div class="max-w-5xl mx-auto text-center">
    <h1 class="text-4xl font-bold mb-4">
      Manage your workflow easily
    </h1>

    <p class="mb-6 text-gray-600">
      FlowApp helps teams stay organized and productive with simple tools.
    </p>

    <div class="flex justify-center gap-4 mb-10">
      <button class="bg-blue-500 text-white px-5 py-2 rounded">
        Start Free Trial
      </button>

      <button class="border px-5 py-2 rounded">
        Learn More
      </button>
    </div>
  </div>


  <!-- IMAGE + FLOATING CARDS -->
  <div class="relative max-w-4xl mx-auto overflow-visible">

    <img src="https://kissflow.com/hs-fs/hubfs/og_important_tips_to_manage_your_workflows_and_improve_their_efficiency-1.webp?width=1250&height=750&name=og_important_tips_to_manage_your_workflows_and_improve_their_efficiency-1.webp/800x400"
         class="rounded shadow w-full">

    <!-- CARD 1 -->
    <div class="absolute -bottom-20 -left-6 bg-white p-3 rounded shadow text-sm hover:text-blue-500">
      <p class="font-semibold">Tasks</p>
      <p>12 tasks completed today</p>
    </div>

    <!-- CARD 2 -->
    <div class="absolute -bottom-20 -right-6 bg-white p-3 rounded shadow text-sm hover:text-blue-500">
      <p class="font-semibold">Status</p>
      <p class="text-green-600">On Track</p>
    </div>

    <!-- CARD 3 -->
    <div class="absolute -bottom-20 left-1/2 -translate-x-1/2 bg-white p-3 rounded shadow text-sm hover:text-blue-500">
      <p class="font-semibold">Team</p>
      <p>+5 online</p>
    </div>

  </div>

</section>


<!-- CHAT WIDGET -->
<div class="fixed bottom-6 right-6 bg-blue-500 text-white px-4 py-3 rounded-full shadow-lg z-50">
  Chat
</div>


</body>
</html>
